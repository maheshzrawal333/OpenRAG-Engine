version: '3.8'

services:
  # 1. Vector Database
  postgres:
    image: ankane/pgvector:latest
    container_name: openrag-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=knowledge_base
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_base"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis for Distributed SSE (Pub/Sub)
  redis:
    image: redis:alpine
    container_name: openrag-redis
    ports:
      - "6379:6379"

  # 3. MinIO for S3-Compatible Cloud Storage
  minio:
    image: minio/minio:latest
    container_name: openrag-minio
    ports:
      - "9000:9000"
      - "9001:9001" # MinIO Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 4. Ollama AI Engine
  ollama:
    image: ollama/ollama:latest
    container_name: openrag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 5. AI Initialization Script
  ollama-init:
    image: curlimages/curl:latest
    container_name: openrag-ollama-init
    depends_on:
      - ollama
    command: >
      sh -c "sleep 10 &&
             curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}' &&
             curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:3b\"}' &&
             curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"deepseek-r1:8b\"}'"

volumes:
  ollama_data:
  minio_data: