# ==========================================
# OpenRAG Engine - Application Core
# ==========================================
spring.application.name=OpenRAG-Engine
server.port=8081
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ==========================================
# 1. Database & Migrations (PostgreSQL + Flyway)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5434/knowledge_base
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- SENIOR ARCHITECTURE: DATABASE CONNECTION POOL (HIKARICP) ---
# Prevent "Connection is not available" by tuning the pool for Docker/Network timeouts
# Max time a connection can sit in the pool (Idle/Active). 10 mins (shorter than Docker TCP timeout).
spring.datasource.hikari.max-lifetime=600000
# Max wait time for a connection. Fail fast (15s) instead of hanging (default 30s+).
spring.datasource.hikari.connection-timeout=15000
# Ping the DB every 4 mins to keep the TCP link active.
spring.datasource.hikari.keepalive-time=240000
# Max time a connection can sit idle. (5 mins).
spring.datasource.hikari.idle-timeout=300000
# Proactively test connection validity before handing to service.
spring.datasource.hikari.connection-test-query=SELECT 1

# Flyway Schema Management
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==========================================
# 2. Vector Store Configuration (pgvector)
# ==========================================
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.initialize-schema=false 

# ==========================================
# 3. Local AI Engine Configuration (Ollama)
# ==========================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:3b
spring.ai.ollama.chat.options.temperature=0.0
spring.ai.ollama.embedding.options.model=nomic-embed-text

# ==========================================
# 4. Distributed Pub/Sub (Redis for SSE)
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================================
# 5. Cloud Storage (MinIO)
# ==========================================
spring.cloud.aws.s3.endpoint=http://localhost:9000
spring.cloud.aws.credentials.access-key=minioadmin
spring.cloud.aws.credentials.secret-key=minioadmin
spring.cloud.aws.region.static=us-east-1
cloud.aws.s3.bucket-name=openrag-evidence-vault

# ==========================================
# 6. Enterprise Security (OAuth2 / JWT)
# ==========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/openrag-realm

# ==========================================
# 7. Ingestion / File Upload Settings
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================
# 8. Enterprise Resiliency Settings
# ==========================================
# Keep AI streaming alive for 10 minutes
server.tomcat.connection-timeout=600000
spring.mvc.async.request-timeout=600000

# Cache Busting
spring.web.resources.cache.period=0
spring.web.resources.chain.strategy.content.enabled=true

# ==========================================
# 9. Application Logging
# ==========================================
logging.level.root=INFO
logging.level.com.maheshz.openrag.engine=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.security=DEBUG