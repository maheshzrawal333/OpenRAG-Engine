# ==============================================================================
# OpenRAG Engine - Enterprise Application Configuration
# ==============================================================================
# ARCHITECTURAL OVERVIEW:
# This file centralizes the infrastructure bindings for the Retrieval-Augmented
# Generation (RAG) backend. It connects the JVM to PostgreSQL (pgvector),
# local LLMs (Ollama), Object Storage (MinIO), and Pub/Sub (Redis).
# ==============================================================================

spring.application.name=ForensiX-Engine
server.port=8081

# Resiliency: If an initialization script fails (e.g., dropping a table that doesn't exist),
# do not crash the Spring Application Context. Log it and proceed.
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ==============================================================================
# 1. Database & Migrations (PostgreSQL + Flyway)
# ==============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5434/knowledge_base
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- SENIOR ARCHITECTURE: DATABASE CONNECTION POOL (HIKARICP) ---
# DEFENSIVE TUNING: Docker network bridges and cloud load balancers aggressively
# terminate idle TCP connections (usually after 5-15 minutes). If HikariCP isn't
# aware the connection was dropped, the JVM will throw catastrophic "Broken Pipe"
# or "Connection is not available" exceptions under load.

# Max time a connection can exist before being gracefully retired.
# Set to 10 mins (600000ms), which is strictly shorter than standard Docker TCP timeouts.
spring.datasource.hikari.max-lifetime=600000

# Fail-Fast mechanism. If the pool is exhausted, throw an exception after 15s
# rather than letting the Tomcat worker thread hang indefinitely (default is 30s+).
spring.datasource.hikari.connection-timeout=15000

# Proactively ping the DB every 4 mins to keep the TCP link active and prevent
# firewalls from silently dropping the socket.
spring.datasource.hikari.keepalive-time=240000

# Retire connections that have been sitting idle in the pool for 5 minutes.
spring.datasource.hikari.idle-timeout=300000

# The ultimate safety net: Test connection validity right before handing it to a repository.
spring.datasource.hikari.connection-test-query=SELECT 1

# --- SCHEMA GOVERNANCE ---
# We enforce Flyway as the single source of truth for database migrations.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# CRITICAL PRODUCTION SETTING: Never let Hibernate automatically alter tables.
# 'validate' ensures the compiled Java Entities match the Flyway schema perfectly.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Prevents the dreaded N+1 query memory leak and ensures database transactions
# are strictly bound to the Service layer, not the View/Controller layer.
spring.jpa.open-in-view=false

# ==============================================================================
# 2. Vector Store Configuration (pgvector)
# ==============================================================================
# Dimensions MUST mathematically align with your embedding model (Nomic = 768).
# If you switch to OpenAI (1536), this will require a schema migration.
spring.ai.vectorstore.pgvector.dimensions=768

# Cosine Distance is the industry standard for text-based semantic search.
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# HNSW (Hierarchical Navigable Small World) provides O(log N) search performance,
# vastly outperforming IVFFlat for high-dimensional recall at scale.
spring.ai.vectorstore.pgvector.index-type=HNSW

# Bypasses Spring AI's automatic table creation because Flyway handles our schema.
spring.ai.vectorstore.pgvector.initialize-schema=false 

# ==============================================================================
# 3. Local AI Engine Configuration (Ollama)
# ==============================================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:3b
spring.ai.ollama.chat.options.num-ctx=8192

# DETERMINISM TUNING: In forensic/enterprise RAG, we want factual extraction,
# not creative hallucination. Temperature 0.0 enforces greedy decoding.
spring.ai.ollama.chat.options.temperature=0.0
spring.ai.ollama.embedding.options.model=nomic-embed-text

# ==============================================================================
# 4. Distributed Pub/Sub (Redis for SSE)
# ==============================================================================
# Used to decouple the heavy ingestion worker threads from the HTTP layer.
# Enables horizontal scaling of Server-Sent Events (SSE) across multiple JVMs.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==============================================================================
# 5. Cloud Storage (MinIO / S3)
# ==============================================================================
# Binary payloads (PDFs, raw evidence) are pushed directly to S3-compatible
# storage to prevent JVM Heap exhaustion.
spring.cloud.aws.s3.endpoint=http://localhost:9000
spring.cloud.aws.credentials.access-key=minioadmin
spring.cloud.aws.credentials.secret-key=minioadmin
spring.cloud.aws.region.static=us-east-1
cloud.aws.s3.bucket-name=openrag-evidence-vault

# ==============================================================================
# 6. Enterprise Security (OAuth2 / JWT)
# ==============================================================================
# Delegates cryptographic token verification to a central Identity Provider
# (e.g., Keycloak). The API will automatically validate the signature of incoming JWTs.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/openrag-realm

# ==============================================================================
# 7. Ingestion / File Upload Settings
# ==============================================================================
spring.servlet.multipart.enabled=true
# 50MB accommodates dense forensic PDFs and CSVs without exposing the Tomcat
# server to trivial Denial of Service (DoS) memory attacks.
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==============================================================================
# 8. Enterprise Resiliency Settings
# ==============================================================================
# LLM Inference is slow. A dense RAG prompt might take local hardware 3-5 minutes
# to stream a response. We extend Tomcat's TCP timeout to 10 minutes (600000ms)
# to prevent the server from prematurely closing the socket and throwing a 504.
server.tomcat.connection-timeout=600000
spring.mvc.async.request-timeout=600000

# Cache Busting for frontend assets to ensure clients don't load stale JS/CSS.
spring.web.resources.cache.period=0
spring.web.resources.chain.strategy.content.enabled=true

# ==============================================================================
# 9. Application Logging
# ==============================================================================
logging.level.root=INFO
# Isolate debug noise strictly to our proprietary business logic
logging.level.com.maheshz.openrag.engine=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.security=DEBUG